<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" width="700" height="460">
  <defs>
    <linearGradient id="goldSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a6ea5"/>
      <stop offset="35%" stop-color="#e8975f"/>
      <stop offset="60%" stop-color="#f4b876"/>
      <stop offset="100%" stop-color="#0e3b5c"/>
    </linearGradient>
    <linearGradient id="seaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e3b5c"/>
      <stop offset="100%" stop-color="#041d30"/>
    </linearGradient>
    <linearGradient id="hullWhite" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dfe7ec"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3d6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff3d6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Circle frame -->
  <clipPath id="frame">
    <circle cx="350" cy="190" r="175"/>
  </clipPath>

  <circle cx="350" cy="190" r="178" fill="#f4a93f"/>
  <circle cx="350" cy="190" r="175" fill="url(#goldSky)"/>

  <g clip-path="url(#frame)">
    <!-- sun glow -->
    <circle cx="430" cy="100" r="70" fill="url(#sunGlow)"/>
    <circle cx="430" cy="100" r="22" fill="#fff7e0" opacity="0.9"/>

    <!-- clouds -->
    <ellipse cx="220" cy="70" rx="55" ry="12" fill="#ffffff" opacity="0.35"/>
    <ellipse cx="260" cy="80" rx="40" ry="10" fill="#ffffff" opacity="0.3"/>
    <ellipse cx="500" cy="60" rx="45" ry="9" fill="#ffffff" opacity="0.3"/>
    <ellipse cx="170" cy="115" rx="35" ry="8" fill="#ffffff" opacity="0.25"/>

    <!-- sea -->
    <rect x="160" y="255" width="380" height="140" fill="url(#seaGrad)"/>
    <path d="M160 255 Q 350 245 540 255 L 540 270 Q 350 260 160 270 Z" fill="#f4b876" opacity="0.45"/>
    <path d="M170 280 Q 220 272, 270 280 T 370 280 T 470 280 T 530 280" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.25"/>
    <path d="M170 300 Q 220 292, 270 300 T 370 300 T 470 300 T 530 300" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.2"/>
    <path d="M170 320 Q 220 312, 270 320 T 370 320 T 470 320 T 530 320" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.18"/>

    <!-- ===== Ship: three-quarter bow angle ===== -->
    <g>
      <!-- wake -->
      <path d="M195 268 C 230 280, 320 286, 420 280 C 460 277, 500 270, 520 262
               C 500 280, 450 292, 380 295 C 300 298, 230 292, 195 268 Z"
            fill="#ffffff" opacity="0.5"/>

      <!-- hull, red boot stripe at waterline -->
      <path d="M205 262 L 480 258 C 495 257, 505 250, 500 240 L 430 200
               C 420 195, 405 192, 390 192 L 235 196
               C 215 198, 200 215, 198 235 Z"
            fill="#7a1f2b"/>
      <path d="M205 255 L 478 251 C 492 250, 500 244, 496 236 L 428 200
               C 418 196, 403 194, 388 194 L 238 198
               C 220 200, 207 218, 205 238 Z"
            fill="url(#hullWhite)"/>

      <!-- hull windows rows -->
      <g fill="#0e3b5c" opacity="0.55">
        <rect x="225" y="237" width="9" height="6"/>
        <rect x="240" y="235" width="9" height="6"/>
        <rect x="255" y="233" width="9" height="6"/>
        <rect x="270" y="231" width="9" height="6"/>
        <rect x="285" y="229" width="9" height="6"/>
        <rect x="300" y="227" width="9" height="6"/>
        <rect x="315" y="225" width="9" height="6"/>
        <rect x="330" y="223" width="9" height="6"/>
        <rect x="345" y="221" width="9" height="6"/>
        <rect x="360" y="219" width="9" height="6"/>
        <rect x="375" y="218" width="9" height="6"/>
        <rect x="390" y="216" width="9" height="6"/>
        <rect x="405" y="213" width="9" height="6"/>
        <rect x="420" y="210" width="9" height="6"/>
        <rect x="435" y="220" width="9" height="6"/>
      </g>

      <!-- balcony deck 1 -->
      <path d="M218 196 L 392 192 C 405 192, 418 195, 426 200 L 460 222
               C 444 215, 420 211, 395 211 L 232 215 C 224 215, 218 208, 218 196 Z"
            fill="url(#hullWhite)"/>
      <g fill="#0e3b5c" opacity="0.5">
        <rect x="235" y="200" width="11" height="9"/>
        <rect x="252" y="199" width="11" height="9"/>
        <rect x="269" y="198" width="11" height="9"/>
        <rect x="286" y="197" width="11" height="9"/>
        <rect x="303" y="196" width="11" height="9"/>
        <rect x="320" y="195" width="11" height="9"/>
        <rect x="337" y="195" width="11" height="9"/>
        <rect x="354" y="195" width="11" height="9"/>
        <rect x="371" y="196" width="11" height="9"/>
      </g>

      <!-- balcony deck 2 -->
      <path d="M242 192 L 385 188 C 396 188, 406 191, 412 196 L 440 214
               C 425 207, 405 203, 384 203 L 252 206 C 246 206, 242 200, 242 192 Z"
            fill="url(#hullWhite)"/>
      <g fill="#0e3b5c" opacity="0.45">
        <rect x="258" y="195" width="10" height="7"/>
        <rect x="274" y="194" width="10" height="7"/>
        <rect x="290" y="193" width="10" height="7"/>
        <rect x="306" y="192" width="10" height="7"/>
        <rect x="322" y="192" width="10" height="7"/>
        <rect x="338" y="192" width="10" height="7"/>
        <rect x="354" y="192" width="10" height="7"/>
        <rect x="370" y="193" width="10" height="7"/>
      </g>

      <!-- bridge / top superstructure -->
      <path d="M268 188 L 372 184 C 380 184, 387 187, 391 191 L 405 202
               C 392 197, 376 195, 360 195 L 278 198 C 272 198, 268 193, 268 188 Z"
            fill="url(#hullWhite)"/>
      <rect x="290" y="186" width="60" height="8" rx="2" fill="#0e3b5c" opacity="0.5"/>

      <!-- radar domes -->
      <circle cx="305" cy="178" r="8" fill="#ffffff"/>
      <circle cx="380" cy="172" r="9" fill="#ffffff"/>
      <line x1="305" y1="178" x2="305" y2="188" stroke="#dfe7ec" stroke-width="2"/>
      <line x1="380" y1="172" x2="380" y2="184" stroke="#dfe7ec" stroke-width="2"/>

      <!-- mast -->
      <line x1="310" y1="170" x2="310" y2="150" stroke="#0e3b5c" stroke-width="3"/>
      <circle cx="310" cy="148" r="3" fill="#f4a93f"/>

      <!-- funnel -->
      <path d="M420 195 C 418 180, 416 168, 420 160 C 426 154, 444 154, 450 160
               C 454 168, 452 180, 450 195 Z" fill="#0e3b5c"/>
      <rect x="416" y="192" width="38" height="6" rx="2" fill="#7a1f2b"/>

      <!-- bow tip detail -->
      <path d="M198 235 C 195 240, 193 248, 198 255 L 205 262 L 205 238 Z" fill="#dfe7ec"/>
      <circle cx="201" cy="232" r="3" fill="#0e3b5c"/>
    </g>
  </g>

  <!-- Frame ring -->
  <circle cx="350" cy="190" r="175" fill="none" stroke="#0e3b5c" stroke-width="3"/>
  <circle cx="350" cy="190" r="170" fill="none" stroke="#f4a93f" stroke-width="2" opacity="0.7"/>

  <!-- Wordmark -->
  <text x="350" y="395" font-family="Georgia, 'Times New Roman', serif" font-size="50"
        font-weight="700" text-anchor="middle" fill="#0e3b5c" letter-spacing="2">ABC</text>
  <text x="350" y="432" font-family="Georgia, 'Times New Roman', serif" font-size="25"
        text-anchor="middle" fill="#0e3b5c" letter-spacing="7">C R U I S E</text>
</svg>
